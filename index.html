document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Intercare Email Signature — Staff<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n\n\n\n<style>\n  :root{\n    --navy:#291a6b; --navy-deep:#1a1147; --teal:#26cca0; --teal-deep:#1faa86;\n    --cream:#fcf9f7; --ink:#1a1330; --mute:#6b6685; --hair:#e6e2da;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}\n  .page{max-width:1180px;margin:0 auto;padding:40px 32px 80px}\n  header.hero{margin-bottom:28px}\n  .eyebrow{font-size:11px;letter-spacing:1.8px;text-transform:uppercase;color:var(--teal-deep);font-weight:700;margin-bottom:8px}\n  h1{font-family:Georgia,\"Times New Roman\",serif;color:var(--navy);font-size:38px;line-height:1.1;margin:0 0 10px;letter-spacing:-0.5px}\n  .lede{color:var(--mute);font-size:15px;line-height:1.55;max-width:640px;margin:0}\n\n  .grid{display:grid;grid-template-columns: 380px 1fr;gap:24px;align-items:start;margin-top:28px}\n  @media (max-width: 880px){ .grid{grid-template-columns:1fr} }\n\n  .card{background:#fff;border-radius:18px;box-shadow:0 6px 24px rgba(41,26,107,0.07);padding:24px}\n  .card h2{font-family:Georgia,serif;color:var(--navy);font-size:18px;margin:0 0 4px}\n  .card .sub{color:var(--mute);font-size:13px;margin:0 0 18px}\n\n  label{display:block;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--navy);font-weight:700;margin:14px 0 6px}\n  label:first-of-type{margin-top:0}\n  .label-row{display:flex;justify-content:space-between;align-items:center;margin:14px 0 6px}\n  .label-row label{margin:0}\n  /* tiny pill toggle */\n  .switch{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mute);font-weight:700;user-select:none}\n  .switch input{position:absolute;opacity:0;pointer-events:none}\n  .switch .track{width:30px;height:18px;border-radius:999px;background:#d8d3c8;position:relative;transition:background .15s}\n  .switch .track::after{content:\"\";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.18);transition:transform .15s}\n  .switch input:checked + .track{background:var(--teal)}\n  .switch input:checked + .track::after{transform:translateX(12px)}\n  .switch input:focus-visible + .track{box-shadow:0 0 0 3px rgba(38,204,160,.3)}\n  .switch .lbl-on{display:none}\n  .switch.is-on .lbl-on{display:inline}\n  .switch.is-on .lbl-off{display:none}\n  input.is-muted{opacity:.4;background:#f5f2ec;cursor:not-allowed}\n  .locked-label{display:flex;align-items:center;gap:8px}\n  .lock-pill{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--mute);background:#efeae0;border-radius:999px;padding:2px 8px;font-weight:700}\n  .locked-field{width:100%;padding:10px 12px;border:1px dashed var(--hair);border-radius:8px;font-size:14px;color:var(--mute);background:#f7f3ec;font-family:inherit}\n  input{width:100%;padding:10px 12px;border:1px solid var(--hair);border-radius:8px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;transition:border-color .15s, box-shadow .15s}\n  input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(38,204,160,.25)}\n\n  .preview-wrap{position:relative}\n  .preview-frame{width:100%;border:1px solid var(--hair);border-radius:14px;background:#fff;display:block;height:430px}\n  .preview-label{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--mute);font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}\n\n  .copy-row{margin-top:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}\n  .btn{appearance:none;border:0;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:.3px;padding:13px 22px;border-radius:999px;transition:transform .12s ease, background .15s, box-shadow .15s, color .15s}\n  .btn-primary{background:var(--teal);color:#fff;box-shadow:0 6px 18px rgba(38,204,160,.35)}\n  .btn-primary:hover{background:var(--teal-deep);transform:translateY(-1px)}\n  .btn-primary.is-copied{background:var(--navy);box-shadow:0 6px 18px rgba(41,26,107,.35)}\n  .btn-ghost{background:transparent;color:var(--navy);border:1px solid var(--hair)}\n  .btn-ghost:hover{background:rgba(41,26,107,.05)}\n\n  .toast{font-size:13px;color:var(--teal-deep);font-weight:600;opacity:0;transition:opacity .2s}\n  .toast.show{opacity:1}\n\n  details.how{background:var(--navy);color:#fff;border-radius:18px;margin-top:32px;overflow:hidden}\n  details.how summary{cursor:pointer;list-style:none;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px;letter-spacing:.3px}\n  details.how summary::-webkit-details-marker{display:none}\n  details.how summary::after{content:\"+\";font-size:22px;color:var(--teal);font-weight:400;line-height:1}\n  details.how[open] summary::after{content:\"−\"}\n  details.how .how-body{padding:0 24px 22px;color:rgba(255,255,255,.85);font-size:13.5px;line-height:1.7}\n  details.how .how-body h3{font-family:Georgia,serif;color:#fff;font-size:15px;margin:14px 0 6px}\n  details.how .how-body ol{padding-left:20px;margin:0}\n  details.how .how-body kbd{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:1px 6px;font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace}\n\n  .footer{margin-top:28px;font-size:11px;color:var(--mute);letter-spacing:.3px}\n<\u002Fstyle>\n<\u002Fhead><body>\n\n<div class=\"page\">\n  <header class=\"hero\">\n    <div class=\"eyebrow\">Intercare Therapy · Staff<\u002Fdiv>\n    <h1>Your Outlook signature, ready in 30 seconds.<\u002Fh1>\n    <p class=\"lede\">Fill in your details on the left. The main office line is already set; flip on <b>Mobile phone<\u002Fb> if you want to add your own. Then click <b>Copy signature<\u002Fb>, open Outlook, and paste — that's it.<\u002Fp>\n  <\u002Fheader>\n\n  <div class=\"grid\">\n\n    <aside class=\"card\" aria-label=\"Your details\">\n      <h2>Your details<\u002Fh2>\n      <p class=\"sub\">These are the only fields that change.<\u002Fp>\n\n      <label for=\"f-name\">Full name<\u002Flabel>\n      <input id=\"f-name\" type=\"text\" value=\"Jane Doe\" autocomplete=\"name\">\n\n      <label for=\"f-title\">Job title<\u002Flabel>\n      <input id=\"f-title\" type=\"text\" value=\"Care Coordinator\" autocomplete=\"organization-title\">\n\n      <div class=\"label-row\">\n        <label>Office phone<\u002Flabel>\n        <label class=\"switch is-on\" id=\"office-switch\">\n          <input type=\"checkbox\" id=\"f-office-on\" checked=\"\">\n          <span class=\"track\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"lbl-on\">Included<\u002Fspan>\n          <span class=\"lbl-off\">Hidden<\u002Fspan>\n        <\u002Flabel>\n      <\u002Fdiv>\n      <div class=\"locked-field\" id=\"office-field\">(888) 428-3223<\u002Fdiv>\n\n      <div class=\"label-row\">\n        <label for=\"f-mobile\">Mobile phone<\u002Flabel>\n        <label class=\"switch\" id=\"mobile-switch\">\n          <input type=\"checkbox\" id=\"f-mobile-on\">\n          <span class=\"track\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"lbl-on\">Added<\u002Fspan>\n          <span class=\"lbl-off\">Off<\u002Fspan>\n        <\u002Flabel>\n      <\u002Fdiv>\n      <input id=\"f-mobile\" type=\"text\" value=\"(555) 123-4567\" autocomplete=\"tel\" class=\"is-muted\" disabled=\"\">\n\n      <label for=\"f-email\">Email<\u002Flabel>\n      <input id=\"f-email\" type=\"email\" value=\"jane.doe@intercaretherapy.com\" autocomplete=\"email\">\n    <\u002Faside>\n\n    <section>\n      <div class=\"preview-label\"><span>Live preview<\u002Fspan><\u002Fdiv>\n      <div class=\"preview-wrap\">\n        <iframe id=\"preview\" class=\"preview-frame\" title=\"Signature preview\"><\u002Fiframe>\n      <\u002Fdiv>\n\n      <div class=\"copy-row\">\n        <button id=\"copy-btn\" class=\"btn btn-primary\" type=\"button\">Copy signature<\u002Fbutton>\n        <button id=\"download-btn\" class=\"btn btn-ghost\" type=\"button\">Download .htm file<\u002Fbutton>\n        <span id=\"toast\" class=\"toast\" role=\"status\" aria-live=\"polite\"><\u002Fspan>\n      <\u002Fdiv>\n\n      <details class=\"how\" open=\"\">\n        <summary>How to install in Outlook<\u002Fsummary>\n        <div class=\"how-body\">\n\n          <h3>Outlook on Windows (new + classic)<\u002Fh3>\n          <ol>\n            <li>Click <b>Copy signature<\u002Fb> above.<\u002Fli>\n            <li>In Outlook, go to <b>File › Options › Mail › Signatures<\u002Fb> (classic) <em>or<\u002Fem> <b>Settings › Accounts › Signatures<\u002Fb> (new Outlook).<\u002Fli>\n            <li>Click <b>New<\u002Fb>, give it a name (e.g. \"Intercare\"), and paste with <kbd>Ctrl<\u002Fkbd> + <kbd>V<\u002Fkbd> into the editor.<\u002Fli>\n            <li>Set it as the default for <b>New messages<\u002Fb> and <b>Replies/forwards<\u002Fb>, then <b>Save<\u002Fb>.<\u002Fli>\n          <\u002Fol>\n\n          <h3>Outlook on Mac<\u002Fh3>\n          <ol>\n            <li>Click <b>Copy signature<\u002Fb>.<\u002Fli>\n            <li>Open <b>Outlook › Settings › Signatures<\u002Fb>.<\u002Fli>\n            <li>Click <b>+<\u002Fb>, paste with <kbd>⌘<\u002Fkbd> + <kbd>V<\u002Fkbd>, name it, close to save.<\u002Fli>\n            <li>Under <b>Choose default signature<\u002Fb>, pick your new signature.<\u002Fli>\n          <\u002Fol>\n\n          <h3>Outlook on the Web<\u002Fh3>\n          <ol>\n            <li>Click <b>Copy signature<\u002Fb>.<\u002Fli>\n            <li>In Outlook Web, click the gear › <b>Mail › Compose and reply<\u002Fb>.<\u002Fli>\n            <li>Click <b>+ New signature<\u002Fb>, paste in, save, and select it as default.<\u002Fli>\n          <\u002Fol>\n\n          <h3>Outlook mobile app (iPhone / Android)<\u002Fh3>\n          <ol>\n            <li>Open this page on your phone and tap <b>Copy signature<\u002Fb> (or tap <b>Download .htm file<\u002Fb>, open it, then long-press › <b>Select All<\u002Fb> › <b>Copy<\u002Fb>).<\u002Fli>\n            <li>Open the <b>Outlook<\u002Fb> app and tap your account icon (top left).<\u002Fli>\n            <li>Tap the <b>gear<\u002Fb> icon › <b>Signature<\u002Fb>.<\u002Fli>\n            <li>If you have multiple accounts, turn on <b>Per Account Signature<\u002Fb> and pick your Intercare account.<\u002Fli>\n            <li>Tap into the signature field, clear the default text, then long-press › <b>Paste<\u002Fb>.<\u002Fli>\n            <li>Tap the checkmark (iOS) or back arrow (Android) to save.<\u002Fli>\n          <\u002Fol>\n          <p style=\"font-size:12.5px;opacity:.8;margin:6px 0 0;\">Note: the Outlook mobile app strips most formatting from signatures — expect a plain-text version of your name, title, phone, and email rather than the full branded card. For the full signature, install it on desktop or web Outlook (above); it will still appear correctly on emails sent from any device once saved server-side.<\u002Fp>\n\n          <h3>If \"Copy signature\" isn't working<\u002Fh3>\n          <p>Some browsers block rich-clipboard. Click <b>Download .htm file<\u002Fb>, open the file in a browser, press <kbd>Ctrl<\u002Fkbd>/<kbd>⌘<\u002Fkbd> + <kbd>A<\u002Fkbd> to select all, then <kbd>Ctrl<\u002Fkbd>/<kbd>⌘<\u002Fkbd> + <kbd>C<\u002Fkbd> to copy, and paste into Outlook.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n\n      <p class=\"footer\">Intercare Therapy · 501 Shatto Place, Suite 100, Los Angeles, CA 90020 · intercaretherapy.com<\u002Fp>\n    <\u002Fsection>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Signature template (Option 03 body) — placeholders {{NAME}}, {{TITLE}}, {{PHONE}}, {{PHONE_HREF}}, {{EMAIL}} -->\n :#1a1330;line-height:1.55;\">\n                  <!--OFFICE--><tr><td style=\"padding:1px 12px 1px 0;color:#6b6685;\">Office<\u002Ftd><td style=\"padding:1px 0;\"><a href=\"tel:+18884283223\" style=\"color:#291a6b;text-decoration:underline;\">(888) 428-3223<\u002Fa><\u002Ftd><\u002Ftr><!--/OFFICE-->\n                  <!--MOBILE--><tr><td style=\"padding:1px 12px 1px 0;color:#6b6685;\">Mobile<\u002Ftd><td style=\"padding:1px 0;\"><a href=\"tel:{{MOBILE_HREF}}\" style=\"color:#291a6b;text-decoration:underline;\">{{MOBILE}}<\u002Fa><\u002Ftd><\u002Ftr><!--/MOBILE-->\n                <\u002Ftable>\n              <\u002Ftd><\u002Ftr>\n              <tr><td style=\"padding:4px 0 0;\"><a href=\"mailto:{{EMAIL}}\" style=\"color:#291a6b;text-decoration:underline;font-size:12px;\">{{EMAIL}}<\u002Fa><\u002Ftd><\u002Ftr>\n              <tr><td style=\"padding:1px 0 0;\"><a href=\"https://www.intercaretherapy.com\" style=\"color:#291a6b;text-decoration:underline;font-size:12px;\">intercaretherapy.com<\u002Fa><\u002Ftd><\u002Ftr>\n            <\u002Ftable>\n          <\u002Ftd>\n          <td style=\"vertical-align:top;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.65;color:#1a1330;\">\n            <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n              <tr><td style=\"color:#8a85a3;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;font-weight:bold;padding:0 0 4px;\">Headquarters<\u002Ftd><\u002Ftr>\n              <tr><td style=\"font-size:12px;color:#1a1330;line-height:1.55;padding:0;\">Intercare Therapy, Inc.<\u002Ftd><\u002Ftr>\n              <tr><td style=\"font-size:12px;color:#1a1330;line-height:1.55;padding:0;\">501 Shatto Place, Suite 100<\u002Ftd><\u002Ftr>\n              <tr><td style=\"font-size:12px;color:#1a1330;line-height:1.55;padding:0;\">Los Angeles, CA 90020<\u002Ftd><\u002Ftr>\n            <\u002Ftable>\n          <\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftable>\n    <\u002Ftd>\n  <\u002Ftr>\n  <tr>\n    <td style=\"background:#f7f3ec;border-top:1px solid #ece8e1;border-left:1px solid #ece8e1;border-right:1px solid #ece8e1;border-bottom:1px solid #ece8e1;padding:10px 22px;font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#291a6b;border-radius:0 0 14px 14px;\">\n      <table cellpadding=\"0\" cellspacing=\"0\" border=\"0\">\n        <tr>\n          <td style=\"background:#26cca0;color:#ffffff;font-size:9.5px;letter-spacing:1.2px;font-weight:bold;text-transform:uppercase;padding:3px 8px;mso-padding-alt:3px 8px;border-radius:999px;\">New HQ<\u002Ftd>\n          <td style=\"padding-left:10px;font-size:9.5px;color:#291a6b;white-space:nowrap;\">We've moved &mdash; please update your records to <b>501 Shatto Place, Suite 100, Los Angeles<\u002Fb>.<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftable>\n    <\u002Ftd>\n  <\u002Ftr>\n<\u002Ftable>\n<p style=\"margin:14px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:7.5px;line-height:1.4;color:#7a7a7a;max-width:640px;mso-line-height-rule:exactly;\"><b style=\"color:#4a4a4a;\">WARNING:<\u002Fb> This electronic message may contain <b style=\"color:#4a4a4a;\">confidential medical information<\u002Fb> and is intended only for the use of the individual or entity to which it is addressed. If you are not the intended recipient, or the agent responsible for delivering this electronic message to the intended recipient, be advised that any copying, dissemination, distribution, review or disclosure of information from this electronic message and its attachments is strictly prohibited. Persons disclosing confidential medical information are subject to penalties under applicable law. If you have received this message in error, please notify us immediately via reply email or at the telephone number indicated above. Thank you.<\u002Fp>\n<\u002Fscript>\n\n<script>\n(function(){\n  const tpl = document.getElementById('sig-template').innerHTML;\n  const fields = ['name','title','email'];\n  const inputs = {};\n  fields.forEach(k => inputs[k] = document.getElementById('f-' + k));\n  const mobileOn = document.getElementById('f-mobile-on');\n  const mobileSwitch = document.getElementById('mobile-switch');\n  const mobileInput = document.getElementById('f-mobile');\n  const officeOn = document.getElementById('f-office-on');\n  const officeSwitch = document.getElementById('office-switch');\n  const officeField = document.getElementById('office-field');\n  const preview = document.getElementById('preview');\n  const copyBtn = document.getElementById('copy-btn');\n  const dlBtn   = document.getElementById('download-btn');\n  const toast   = document.getElementById('toast');\n\n  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;'); }\n  function telHref(s){\n    const raw = String(s).replace(/[^0-9+]/g,'');\n    // If it's a 10-digit US number with no country code, prepend +1\n    if (/^\\d{10}$/.test(raw)) return '+1' + raw;\n    return raw;\n  }\n\n  // Format a US number as (XXX) XXX-XXXX as the user types\n  function formatUSPhone(value){\n    const d = String(value).replace(/\\D/g, '').slice(0, 10);\n    if (d.length === 0) return '';\n    if (d.length < 4) return '(' + d;\n    if (d.length < 7) return '(' + d.slice(0,3) + ') ' + d.slice(3);\n    return '(' + d.slice(0,3) + ') ' + d.slice(3,6) + '-' + d.slice(6);\n  }\n\n  function render(){\n    let out = tpl;\n    if (officeOn.checked){\n      out = out.replace(/<!--\\/?OFFICE-->/g, '');\n    } else {\n      out = out.replace(/<!--OFFICE-->[\\s\\S]*?<!--\\/OFFICE-->/g, '');\n    }\n    if (mobileOn.checked && mobileInput.value.trim()){\n      out = out\n        .replace(/<!--\\/?MOBILE-->/g, '')\n        .replace(/{{MOBILE_HREF}}/g, esc(telHref(mobileInput.value)))\n        .replace(/{{MOBILE}}/g,      esc(mobileInput.value));\n    } else {\n      out = out.replace(/<!--MOBILE-->[\\s\\S]*?<!--\\/MOBILE-->/g, '');\n    }\n    return out\n      .replace(/{{NAME}}/g,  esc(inputs.name.value))\n      .replace(/{{TITLE}}/g, esc(inputs.title.value))\n      .replace(/{{EMAIL}}/g, esc(inputs.email.value));\n  }\n\n  function fullDocument(){\n    // Wrap rendered body in a full HTML doc with the Office MSO declarations\n    return [\n      '<!doctype html>',\n      '<html xmlns:o=\"urn:schemas-microsoft-com:office:office\" xmlns:w=\"urn:schemas-microsoft-com:office:word\">',\n      '<head><meta charset=\"utf-8\"><title>Intercare Signature<\u002Ftitle>',\n      '<!--[if mso]><xml><o:OfficeDocumentSettings><o:AllowPNG/><o:PixelsPerInch>96<\u002Fo:PixelsPerInch><\u002Fo:OfficeDocumentSettings><\u002Fxml><![endif]-->',\n      '<\u002Fhead><body style=\"margin:0;padding:24px;background:#ffffff;\">',\n      render(),\n      '<\u002Fbody><\u002Fhtml>'\n    ].join('');\n  }\n\n  function updatePreview(){\n    const doc = preview.contentDocument || preview.contentWindow.document;\n    doc.open(); doc.write(fullDocument()); doc.close();\n  }\n\n  function flash(msg, ok){\n    toast.textContent = msg;\n    toast.style.color = ok ? '' : '#c0392b';\n    toast.classList.add('show');\n    clearTimeout(flash._t);\n    flash._t = setTimeout(()=> toast.classList.remove('show'), 2600);\n  }\n\n  async function copySignature(){\n    const html = fullDocument();\n    // Plain-text fallback (very rough)\n    const text = [\n      inputs.name.value, inputs.title.value, '',\n      officeOn.checked ? 'Office (888) 428-3223' : null,\n      (mobileOn.checked && mobileInput.value.trim()) ? ('Mobile ' + mobileInput.value) : null,\n      inputs.email.value,\n      'intercaretherapy.com', '',\n      'Intercare Therapy, Inc.',\n      '501 Shatto Place, Suite 100, Los Angeles, CA 90020'\n    ].filter(Boolean).join('\\n');\n\n    try {\n      if (navigator.clipboard && window.ClipboardItem){\n        const item = new ClipboardItem({\n          'text/html':  new Blob([html], {type:'text/html'}),\n          'text/plain': new Blob([text], {type:'text/plain'})\n        });\n        await navigator.clipboard.write([item]);\n        copyBtn.textContent = '✓ Copied — paste into Outlook';\n        copyBtn.classList.add('is-copied');\n        setTimeout(()=>{ copyBtn.textContent='Copy signature'; copyBtn.classList.remove('is-copied'); }, 3200);\n        flash('Signature copied. Paste into Outlook > Signatures > New.', true);\n        return;\n      }\n      throw new Error('No ClipboardItem');\n    } catch(err){\n      // Fallback: select rendered signature inside an offscreen iframe and execCommand('copy')\n      try {\n        const f = document.createElement('iframe');\n        f.style.cssText = 'position:fixed;left:-9999px;top:0;width:600px;height:400px;border:0';\n        document.body.appendChild(f);\n        const d = f.contentDocument; d.open(); d.write(fullDocument()); d.close();\n        const sel = f.contentWindow.getSelection();\n        const range = d.createRange(); range.selectNodeContents(d.body);\n        sel.removeAllRanges(); sel.addRange(range);\n        f.contentWindow.focus();\n        const ok = d.execCommand('copy');\n        f.remove();\n        if (ok){\n          copyBtn.textContent = '✓ Copied — paste into Outlook';\n          copyBtn.classList.add('is-copied');\n          setTimeout(()=>{ copyBtn.textContent='Copy signature'; copyBtn.classList.remove('is-copied'); }, 3200);\n          flash('Signature copied. Paste into Outlook > Signatures > New.', true);\n          return;\n        }\n      } catch(_){}\n      flash('Copy blocked by browser — use Download .htm instead.', false);\n    }\n  }\n\n  function download(){\n    const blob = new Blob([fullDocument()], {type:'text/html'});\n    const url  = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    const safe = inputs.name.value.replace(/[^a-z0-9]+/gi,'-').toLowerCase() || 'intercare';\n    a.href = url; a.download = 'intercare-signature-' + safe + '.htm';\n    document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(()=> URL.revokeObjectURL(url), 1000);\n    flash('Downloaded. Open the .htm file, select all, copy, then paste into Outlook.', true);\n  }\n\n  fields.forEach(k => inputs[k].addEventListener('input', updatePreview));\n  mobileInput.addEventListener('input', () => {\n    const pos = mobileInput.selectionStart === mobileInput.value.length;\n    mobileInput.value = formatUSPhone(mobileInput.value);\n    if (pos) mobileInput.setSelectionRange(mobileInput.value.length, mobileInput.value.length);\n    updatePreview();\n  });\n  mobileOn.addEventListener('change', () => {\n    mobileSwitch.classList.toggle('is-on', mobileOn.checked);\n    mobileInput.classList.toggle('is-muted', !mobileOn.checked);\n    mobileInput.disabled = !mobileOn.checked;\n    if (mobileOn.checked){ mobileInput.value = formatUSPhone(mobileInput.value); mobileInput.focus(); }\n    updatePreview();\n  });\n  officeOn.addEventListener('change', () => {\n    officeSwitch.classList.toggle('is-on', officeOn.checked);\n    officeField.classList.toggle('is-muted', !officeOn.checked);\n    updatePreview();\n  });\n  copyBtn.addEventListener('click', copySignature);\n  dlBtn.addEventListener('click', download);\n\n  // Initial render — wait for iframe to be ready\n  preview.addEventListener('load', ()=>{ /* nothing — write directly */ });\n  updatePreview();\n})();\n<\u002Fscript>\n<\u002Fbody><\u002Fhtml>"
  </script>
